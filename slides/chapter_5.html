# 1.0 R语言中的对象 (Objects)

## 什么是对象？

.object-def[
**对象 (Object)**：在R中，一切数据都是对象。每个对象都有：
- **类型 (Type)**：对象存储的数据类型
- **属性 (Attributes)**：对象的额外信息（如名称、维度）
- **值 (Value)**：对象存储的具体数据
]

.font-size-14[
```r
# 创建对象：变量名就是对象的"标签"
x &lt;- 10                      # 数值对象
name &lt;- "张三"               # 字符串对象
is_male &lt;- TRUE             # 逻辑对象
```
]

---

## 常见的对象类型（数据结构）

.object-types[
R中的数据存储在不同的"容器"中，形成不同的数据结构：
]

.pull-left[
### 存放单一类型数据
- **向量 (Vector)**：一维
- **矩阵 (Matrix)**：二维
- **数组 (Array)**：多维
]

.pull-right[
### 存放混合类型数据
- **数据框 (Data Frame)**：类似表格
- **列表 (List)**：任意类型
]

---

## 向量 (Vector)

### 最基本的数据结构

.font-size-14[
```r
# 创建向量
v1 &lt;- c(1, 2, 3, 4, 5)           # 数值向量
v2 &lt;- c("apple", "banana")        # 字符串向量
v3 &lt;- c(TRUE, FALSE, TRUE)        # 逻辑向量
v4 &lt;- 1:10                        # 1到10的序列

# 查看向量
v1
length(v1)                        # 长度
class(v1)                         # 类型
```
]

---

## 矩阵 (Matrix)

### 二维数据结构

.font-size-14[
```r
# 创建矩阵
m1 &lt;- matrix(1:9, nrow = 3, ncol = 3)
m1

# 按行填充
m2 &lt;- matrix(1:9, nrow = 3, ncol = 3, byrow = TRUE)
m2

# 矩阵属性
dim(m1)                           # 维度
nrow(m1)                          # 行数
ncol(m1)                          # 列数
```
]

---

## 数据框 (Data Frame)

### 心理学研究中最常用的数据结构

.font-size-14[
```r
# 创建数据框
df &lt;- data.frame(
  id = 1:3,
  name = c("张三", "李四", "王五"),
  score = c(85, 92, 78)
)
df

# 查看属性
class(df)                         # "data.frame"
nrow(df)                          # 行数
ncol(df)                          # 列数
str(df)                           # 结构
```
]

---

## 列表 (List)

### 灵活的"大杂烩"

.font-size-14[
```r
# 创建列表：可以装任何东西
my_list &lt;- list(
  name = "张三",
  age = 25,
  scores = c(85, 92, 78),
  df = df
)

# 查看列表
my_list
my_list$name                      # 按名称访问
my_list[[1]]                      # 按位置访问
```
]

---

## 如何查看对象的"身份"？

### 三个最重要的函数

.font-size-14[
```r
# class() - 查看对象的类型（数据类型）
class(10)               # "numeric"
class("hello")          # "character"
class(df)               # "data.frame"

# str() - 查看对象的结构（详细）
str(df)
str(v1)

# attributes() - 查看对象的属性
attributes(df)           # names, class, row.names
```
]

---

## 对象的属性

### 常见属性

.font-size-14[
```r
# names - 元素的名称
v &lt;- c(a = 1, b = 2, c = 3)
names(v)                # "a" "b" "c"

# dim - 维度（矩阵/数组）
dim(m1)                 # 3 3

# class - 对象的类
class(v1)               # "integer"
class(df)               # "data.frame"

# 查看所有属性
attributes(df)
```
]

---

## 对象与变量名的关系

### 变量名只是"标签"

.font-size-14[
```r
# 变量名相当于贴在对象上的"标签"
x &lt;- 100
y &lt;- x                  # y也指向同一个对象

# 修改y不会影响x（因为R使用浅拷贝）
y &lt;- 200
x                       # 还是100

# 但修改对象内容会相互影响
df1 &lt;- df
df1$age &lt;- 30
df$age                  # df也被修改了！
```
]

---

## 特殊对象：NULL 和 NA

.font-size-14[
```r
# NULL - 空对象，不占空间
x &lt;- NULL
length(x)               # 0
is.null(x)              # TRUE

# NA - 缺失值
y &lt;- NA
length(y)               # 1
is.na(y)                # TRUE

# 两者的区别
is.null(NA)             # FALSE
is.na(NULL)             # FALSE
```
]

---

## 对象小结

| 对象类型 | 说明 | 示例 |
|----------|------|------|
| 向量 | 一维，同类型数据 | `c(1, 2, 3)` |
| 矩阵 | 二维，同类型数据 | `matrix(1:9, 3, 3)` |
| 数组 | 多维，同类型数据 | `array(1:24, c(3,4,2))` |
| 数据框 | 二维，混合类型（最常用） | `data.frame(a=1, b=2)` |
| 列表 | 一维，任意类型 | `list(a=1, b="hello")` |

# 1.2 数据框的行筛选

## 如何筛选特定的行？

.question[
**问题**：如何从penguin数据中，只选择"清华站点"的数据？
]

---

## 行的筛选：使用逻辑条件

.font-size-14[
```r
# 查看有哪些站点
unique(df$Site)

# 筛选清华站点的数据
df_thu &lt;- df[df$Site == "Tsinghua", ]
dim(df)          # 原始数据行数
dim(df_thu)      # 筛选后行数
```
]

⚠️ **注意**：`==` 表示"等于"，一个等号是赋值！

---

## 组合多个条件

.font-size-14[
```r
# AND（且）：同时满足两个条件
df_filtered &lt;- df[df$Site == "Tsinghua" &amp; df$sex == 1, ]

# OR（或）：满足任一条件
df_filtered2 &lt;- df[df$Site == "Tsinghua" | df$Site == "Peking", ]

# NOT（非）：排除某些条件
df_not_thu &lt;- df[df$Site != "Tsinghua", ]
```
]

---

## 使用 subset() 函数筛选

.font-size-14[
```r
# 更直观的筛选方式
df_thu &lt;- subset(df, Site == "Tsinghua")

# 多条件筛选
df_filtered &lt;- subset(df, Site == "Tsinghua" &amp; sex == 1)

# 筛选特定列
df_subset &lt;- subset(df, age &gt; 30, select = c("age", "sex", "Site"))
```
]

---

# 1.3 列的筛选进阶

## 如何选取特定的列？

.font-size-14[
```r
# 方法1：列名向量
cols &lt;- c("Site", "age", "sex")
df_subset &lt;- df[, cols]

# 方法2：列的序号
df_subset &lt;- df[, 1:5]          # 前5列
df_subset &lt;- df[, -c(1, 2)]    # 排除前2列
```
]

---

## 选取名字符合模式的列

.font-size-14[
**问题**：如何选取所有以"stress"开头的列？
]

.font-size-14[
```r
# 使用 startsWith()
stress_cols &lt;- colnames(df)[startsWith(colnames(df), "stress")]
stress_cols

# 使用 grep() - 返回匹配的索引
stress_idx &lt;- grep("^stress", colnames(df))
colnames(df)[stress_idx]

# 使用 endsWith() - 匹配结尾
site_cols &lt;- colnames(df)[endsWith(colnames(df), "site")]
```
]

---

## 综合：选取列 + 筛选行

.font-size-14[
```r
# 1. 确定要选取的列
selected_cols &lt;- c("Site", colnames(df)[startsWith(colnames(df), "stress")])

# 2. 选取这些列
df_stress &lt;- df[, selected_cols]

# 3. 筛选特定站点
df_stress_thu &lt;- df_stress[df_stress$Site == "Tsinghua", ]
```
]

# 1.4 因子型数据

## 什么是因子？

.factor-def[
**因子 (Factor)**：专门用来表示分类变量的数据类型
]

.font-size-14[
在心理学研究中，数据分为：
- **定量数据**：数值型（如年龄、分数）
- **定性数据**：分类型
  - 名义型：无顺序之分（如性别、国家）
  - 有序型：有顺序之分（如学历、疗效）
]

---

## 字符型 vs 因子型

.font-size-14[
```r
# 字符型：按字母顺序排列
x &lt;- c("high", "medium", "low")
sort(x)               # low, medium, high（按字母顺序）

# 因子型：按设定的水平排列
x_factor &lt;- factor(x, levels = c("low", "medium", "high"))
sort(x_factor)        # low, medium, high（按设定顺序）
```
]

---

## 创建因子

.font-size-14[
```r
# 基本用法
gender &lt;- c("M", "F", "M", "F")
gender_factor &lt;- factor(gender, levels = c("F", "M"), 
                       labels = c("Female", "Male"))
gender_factor

# 查看因子信息
levels(gender_factor)       # 水平
nlevels(gender_factor)     # 水平数量
table(gender_factor)       # 频数统计
```
]

---

## 心理学研究中的因子

.font-size-14[
```r
# 学历：有顺序的有序型变量
education &lt;- c("high", "middle", "low", "middle", "high")
edu_factor &lt;- factor(education, 
                    levels = c("low", "middle", "high"),
                    ordered = TRUE)
edu_factor

# 国家：名义型变量
country &lt;- c("China", "USA", "China", "Japan")
country_factor &lt;- factor(country)
levels(country_factor)     # 按字母顺序排列
```
]

# 1.5 字符串的匹配与操作

## 字符串匹配函数

.font-size-14[
```r
# 完全匹配
"hello" == "hello"                    # TRUE
"hello" %in% c("hello", "world")      # TRUE

# 部分匹配 - 使用 grepl()
grepl("ell", c("hello", "world"))      # TRUE FALSE

# 开头匹配
startsWith(c("stress1", "stress2", "age"), "stress")  # TRUE TRUE FALSE

# 结尾匹配
endsWith(c("file1.csv", "file2.csv", "data.csv"), ".csv")  # TRUE TRUE FALSE
```
]

---

## grep 家族函数

.font-size-14[
```r
# grep() - 返回匹配的索引
idx &lt;- grep("stress", colnames(df))
idx

# grep() - 返回匹配的值
vals &lt;- grep("stress", colnames(df), value = TRUE)
vals

# 使用正则表达式
idx &lt;- grep("^stress[0-9]$", colnames(df))  # stress后面跟一个数字
```
]

---

## 字符串操作函数

.font-size-14[
```r
# 转换大小写
tolower("HELLO")      # "hello"
toupper("hello")      # "HELLO"

# 去除空格
trimws("  hello  ")   # "hello"

# 粘贴字符串
paste("Hello", "World")                    # "Hello World"
paste0("Hello", "World")                   # "HelloWorld"
paste("ID", 1:3, sep = "_")               # "ID_1" "ID_2" "ID_3"

# 分割字符串
strsplit("a-b-c", split = "-")            # "a" "b" "c"
```
]

# 1.6 函数基础

## 什么是函数？

.func-def[
**函数**：封装好的代码块，接受输入（参数），执行操作，返回结果
]

.font-size-14[
我们已经用过的函数：
```r
mean(x)              # 计算平均值
sd(x)                # 计算标准差
sum(x)               # 求和
class(x)             # 查看数据类型
str(x)               # 查看结构
```
]

---

## 函数的调用方式

.font-size-14[
**方式1：直接调用**
```r
mean(c(1, 2, 3, 4, 5))
```

**方式2：使用包名::函数名**
```r
bruceR::import("data.csv")
dplyr::filter(df, age &gt; 30)
```

**方式3：先加载包，再直接调用**
```r
library(dplyr)
filter(df, age &gt; 30)
```
]

---

## 如何获取函数帮助？

.font-size-14[
**方法1：在Console中输入 ?**
```r
?mean
?str
```

**方法2：使用 help()**
```r
help("mean")
```

**方法3：在线搜索**
R documentation: https://www.rdocumentation.org
```

帮助文档通常包含：
- Description：函数功能描述
- Usage：函数用法
- Arguments：参数说明
- Examples：使用示例
```

---

## 函数的参数

.font-size-14[
```r
# 函数有参数（Arguments）
mean(x, na.rm = FALSE, trim = 0, ...)

# x: 要计算的数据（必需参数）
# na.rm: 是否移除缺失值（可选参数，有默认值）
# trim: 截断均值（可选参数）
```

**形式参数 vs 实际参数**
```r
# 形式参数：函数定义时的参数名
# 实际参数：调用函数时传入的具体值
mean(c(1, 2, 3))     # c(1,2,3) 是实际参数，x 是形式参数
```
]

# 1.7 自定义函数

## 为什么要自定义函数？

.custom-reason[
当需要重复执行某项操作时，可以将其封装为函数：
- 避免重复写相同的代码
- 使代码更清晰、更易维护
- 方便共享和复用
]

---

## 自定义函数的基本结构

.font-size-14[
```r
# 定义函数
function_name &lt;- function(参数1, 参数2, ...) {
  # 函数体：执行的操作
  result &lt;- ...
  return(result)  # 返回结果
}

# 示例：计算两数的加权平均
weighted_mean &lt;- function(x, y, w) {
  result &lt;- (x * w1 + y * w2) / (w1 + w2)
  return(result)
}
```
]

---

## 自定义函数示例

.font-size-14[
```r
# 定义函数：计算 BMI
calc_bmi &lt;- function(weight_kg, height_m) {
  bmi &lt;- weight_kg / (height_m ^ 2)
  return(bmi)
}

# 调用函数
calc_bmi(60, 1.70)        # weight=60kg, height=1.70m
calc_bmi(65, 1.75)        # weight=65kg, height=1.75m
```
]

---

## 设置默认参数

.font-size-14[
```r
# 设置默认参数
calc_bmi &lt;- function(weight_kg = 60, height_m = 1.70) {
  bmi &lt;- weight_kg / (height_m ^ 2)
  return(bmi)
}

# 调用时不传参，使用默认值
calc_bmi()                 # 使用默认值

# 调用时传参，使用传入的值
calc_bmi(weight_kg = 70)  # 只传weight
calc_bmi(1.80, 75)        # 按顺序传参
```
]

---

## 添加错误检查

.font-size-14[
```r
calc_bmi_safe &lt;- function(weight_kg, height_m) {
  # 检查输入是否为数值
  if (!is.numeric(weight_kg) | !is.numeric(height_m)) {
    stop("Error: weight and height must be numeric!")
  }
  
  # 检查数值是否合理
  if (weight_kg &lt;= 0 | height_m &lt;= 0) {
    stop("Error: weight and height must be positive!")
  }
  
  bmi &lt;- weight_kg / (height_m ^ 2)
  return(bmi)
}

calc_bmi_safe("60", 1.70)  # 报错！
calc_bmi_safe(60, 1.70)    # 正常计算
```
]

## 函数小结

| 函数类型 | 说明 | 示例 |
|----------|------|------|
| 数学函数 | mean, sum, sd, sqrt | `mean(x)` |
| 统计函数 | t.test, cor, lm | `t.test(x, y)` |

# 2.3 Workflow 3: 数据计算

## 工作流程：理解任务 → 逐行计算 → 汇总统计

.font-size-14[
**任务**：计算清华站点被试的压力总分和均值
]

.font-size-14[
```r
# Step 1: 选取清华站点 + stress列
stress_cols &lt;- colnames(df)[startsWith(colnames(df), "stress")]
df_stress_thu &lt;- df[df$Site == "Tsinghua", c("Site", stress_cols)]

# Step 2: 计算每行的stress总分
df_stress_thu$stress_sum &lt;- rowSums(df_stress_thu[, stress_cols], na.rm = TRUE)

# Step 3: 计算均值和标准差
mean(df_stress_thu$stress_sum, na.rm = TRUE)
sd(df_stress_thu$stress_sum, na.rm = TRUE)
```
]

⚠️ **人工检查**：计算逻辑是否正确？NA处理是否合理？

# 2.4 Workflow 4: 创建自定义函数

## 工作流程：明确需求 → 定义函数 → 测试函数

.font-size-14[
**任务**：创建一个计算描述统计的函数
]

.font-size-14[
```r
# Step 1: 定义函数
desc_stats &lt;- function(x) {
  n &lt;- length(x)
  mean_val &lt;- mean(x, na.rm = TRUE)
  sd_val &lt;- sd(x, na.rm = TRUE)
  min_val &lt;- min(x, na.rm = TRUE)
  max_val &lt;- max(x, na.rm = TRUE)
  
  result &lt;- data.frame(
    n = n,
    mean = mean_val,
    sd = sd_val,
    min = min_val,
    max = max_val
  )
  return(result)
}

# Step 2: 测试函数
desc_stats(df$age)
```
]

.font-size-14[
```r
# Step 3: 应用到多列
desc_stats(df$stress_sum)
```
]

# 2.5 综合案例

## 完整工作流程：计算清华站点压力得分

.font-size-14[
```r
# Step 1: 读取数据
df &lt;- bruceR::import(here::here("slides", "data", "penguin", "penguin_rawdata.csv"))
```
]

⚠️ **人工检查1**：数据是否正确读取？

.font-size-14[
```r
# Step 2: 确定stress相关列
stress_cols &lt;- colnames(df)[startsWith(colnames(df), "stress")]
selected &lt;- c("Site", stress_cols)
df_sub &lt;- df[, selected]
```
]

⚠️ **人工检查2**：选取的列是否正确？

.font-size-14[
```r
# Step 3: 筛选清华站点
df_thu &lt;- df_sub[df_sub$Site == "Tsinghua", ]
```
]

.font-size-14[
```r
# Step 4: 计算压力总分
df_thu$stress_sum &lt;- rowSums(df_thu[, stress_cols], na.rm = TRUE)
```
]

.font-size-14[
```r
# Step 5: 计算描述统计
psych::describe(df_thu$stress_sum)
```
]

⚠️ **人工检查3**：结果是否符合预期？均值和标准差是否合理？

# 2.6 常见错误与调试

## 常见错误

.font-size-14[
**错误1：大小写不匹配**
```r
df[df$Site == "tsinghua", ]    # ❌ 小写
df[df$Site == "Tsinghua", ]    # ✅ 大写T
```

**错误2：多加了逗号**
```r
df$age[, 1]                    # ❌ 错误
df$age[1]                      # ✅ 正确
```

**错误3：== 和 = 混淆**
```r
df$age = 30                    # ❌ 赋值
df$age == 30                   # ✅ 比较
```
]

---

## 调试方法

.font-size-14[
**方法1：分步运行**
```r
# 不要写成一行，先分解
cols &lt;- grep("stress", colnames(df))
df_sub &lt;- df[, cols]
```

**方法2：查看中间结果**
```r
cols &lt;- grep("stress", colnames(df))
print(cols)                    # 查看索引
print(colnames(df)[cols])      # 查看列名
```

**方法3：检查数据类型**
```r
class(df$Site)                 # 确保是character
unique(df$Site)                # 查看有哪些值
```
]
