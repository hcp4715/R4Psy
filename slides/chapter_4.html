# 1.1 数据的"住址"——什么是路径？

## 从打开文件说起

当你用电脑打开一个文件时，电脑需要知道这个文件在哪里：

.pull-left[
.font-size-14[在 Mac 上：Finder 打开文件夹的方式]
1. 点击 Finder
2. 进入"桌面"文件夹
3. 进入"课程资料"文件夹
4. 找到"数据.csv"文件
]

.pull-right[
.font-size-14[在 Windows 上：资源管理器打开文件夹的方式]
1. 点击"此电脑"或桌面图标
2. 进入"C盘"
3. 进入"用户"文件夹
4. 找到"数据.csv"文件
]

---

## 什么是路径？

.path-def[路径就是：文件在电脑中的"地址"，告诉你怎么从电脑的"门口"走到这个文件的位置。]

.path-example[
例子：就像你知道"江苏省南京市鼓楼区南京师范大学"是一个地址一样，电脑也需要知道文件的完整地址。
]

---

## 1.1 路径的表示方式 (_Mac 系统_)

### Mac 上的路径看起来是这样的：

.font-size-14[
```
/Users/zhangsan/Desktop/课程资料/数据.csv
```
]

其中：
- `/` : 相当于中文的"里面的"，表示进入某个文件夹
- `~` : 代表你的用户文件夹（如 `/Users/zhangsan/`）

### 让我们在 Finder 中看看：

![path_mac](picture/chp4/path1.jpg)

.path-highlight[从左到右看：桌面 → 课程资料 → 数据.csv]

---

## 1.1 路径的表示方式 (_Mac 系统_)

### 完整路径 vs 简化路径

.font-size-14[
完整路径（从电脑"门口"出发）：
```
/Users/zhangsan/Desktop/课程资料/数据.csv
```

简化路径（从当前位置出发）：
```
课程资料/数据.csv
```
]

.path-tip[
💡 **简化路径**就是我们常说的"相对路径"，只要告诉电脑"从这里往里走"，不用从"门口"说起。
]

---

## 1.1 路径的表示方式 (_Windows 系统_)

### Windows 上的路径看起来是这样的：

.font-size-14[
```
C:\Users\zhangsan\Desktop\课程资料\数据.csv
```
]

其中：
- `C:\` : 代表C盘
- `\` : 反斜杠，表示文件夹层级

### 让我们在文件资源管理器中看看：

![path_win](picture/chp4/abspath.jpg)

.path-highlight[从左到右看：此电脑 → C盘 → 用户 → ... → 数据.csv]

---

## 1.1 Mac vs Windows 路径对比

| 特征 | Mac | Windows |
|------|-----|---------|
| 路径起始 | `/` 或 `~` | `C:\`、`D:\` 等 |
| 分隔符 | `/` (斜杠) | `\` (反斜杠) |
| 示例 | `/Users/.../file.csv` | `C:\Users\...\file.csv` |

.path-warning[
⚠️ **重要**：R语言中统一使用 `/` (斜杠) 作为路径分隔符！
]

---

## 1.1 Windows 用户特别注意！

### ❌ 不要直接复制 Windows 地址栏的路径

.font-size-14[
Windows 地址栏显示：
```
C:\Users\zhangsan\Desktop\课程资料\数据.csv
```

如果直接复制到 R 中，需要手动把 `\` 改成 `/`：
```
C:/Users/zhangsan/Desktop/课程资料/数据.csv
```
]

### ✅ 正确做法

1. 复制地址栏的路径
2. 把所有 `\` 替换成 `/`
3. 或者使用我们后面要讲的 `here()` 函数（推荐！）

---

# 1.2 绝对路径 vs 相对路径

## 两种路径：绝对路径

.font-size-14[
**绝对路径**：从电脑的"最门口"出发，描述文件的完整位置

Mac 示例：
```
/Users/zhangsan/Documents/R4Psy/data/penguin/penguin_rawdata.csv
```

Windows 示例：
```
C:/Users/zhangsan/Documents/R4Psy/data/penguin/penguin_rawdata.csv
```
]

.abs-path[
✅ 绝对路径的优点：无论你现在在哪里，都能找到文件
❌ 绝对路径的缺点：路径很长，不同电脑不一样，换电脑就要改
]

---

## 两种路径：相对路径

.font-size-14[
**相对路径**：从"当前位置"出发，描述文件在哪里

假设你的 R 文件（.Rmd）保存在 `R4Psy` 文件夹里：
```
R4Psy/
├── slides/          ← 你的 .Rmd 文件在这里
│   └── chapter_4.Rmd
└── data/
    └── penguin/
        └── penguin_rawdata.csv  ← 要读取的数据
```

读取数据时，只需要：
```r
"data/penguin/penguin_rawdata.csv"
```
]

.rel-path[
✅ 相对路径的优点：短！换电脑不用改！共享代码更方便
❌ 相对路径的缺点：需要知道"当前位置"在哪里
]

---

## 工作目录：相对路径的"起点"

.path-def[
**工作目录 (Working Directory)**：就是相对路径的"起点"文件夹
]

### R 如何知道工作目录在哪里？

.font-size-14[
1. **打开 .Rproj 文件时**：自动把该文件所在的文件夹作为工作目录

2. **打开 .Rmd 文件时**：自动把该文件所在的文件夹作为工作目录

3. **手动设置**：
```r
getwd()      # 查看当前工作目录
setwd("路径") # 设置工作目录
```
]

.path-tip[
💡 **强烈建议**：使用 .Rproj 或 .Rmd 文件，这样工作目录会自动设置好！
]

---

## 在 RStudio 中设置工作目录

### 方法一：Tools → Global Options（自动挡 🌟推荐🌟）

.font-size-14[
设置默认工作目录后，每次打开 RStudio 都会从这里开始
]

![set_wd_auto](picture/chp4/wd1.png)

---

### 方法二：使用 bruceR 包（半自动挡）

.font-size-14[
点击运行后，会弹出一个窗口让你选择文件夹
```r
# 两种写法都可以
bruceR::set.wd(ask = TRUE)
bruceR::set_wd(ask = TRUE)    # 下划线版本
```
]

### 方法三：使用 setwd()（手动挡）

.font-size-14[
```r
# Mac 用户
setwd("/Users/zhangsan/Documents/R4Psy")

# Windows 用户
setwd("C:/Users/zhangsan/Documents/R4Psy")
```
]

---

## 跨系统神器：here() 函数

.path-def[
`here()` 函数：自动帮你处理不同系统、不同项目的路径问题！
]

.font-size-14[
```r
# 安装并加载
pacman::p_load(here)

# 读取数据 - 自动适配 Mac/Windows
here::here("data", "penguin", "penguin_rawdata.csv")
```
]

.path-example[
这里 `here("data", "penguin", "penguin_rawdata.csv")` 会自动生成：
- Mac: `data/penguin/penguin_rawdata.csv`
- Windows: `data\penguin\penguin_rawdata.csv`
]

.path-tip[
💡 **强烈建议**：在读取数据时，都使用 `here::here()` 函数！
]

---

## 路径小结

| 概念 | 说明 | 示例 |
|------|------|------|
| 绝对路径 | 从电脑根目录开始的完整地址 | `/Users/.../data.csv` |
| 相对路径 | 从当前文件夹出发的地址 | `data/data.csv` |
| 工作目录 | 相对路径的"起点" | Rmd文件所在的文件夹 |
| `here()` | 自动生成正确路径的函数 | `here("data","file.csv")` |

.path-tip[
💡 **黄金法则**：使用 .Rproj/.Rmd + `here()` = 永不走丢！
]

# 1.3 R语言中的数据类型

## 数据类型：数据的"身份证"

.data-type[
每一种数据都有自己的"类型"，就像人有不同的"身份"一样。R语言认识三种主要的数据类型：
]

.pull-left[
### 🔢 数值型 (numeric)
- 整数：1, 2, 3, 100
- 小数：3.14, 2.718, 0.5

### 🔣 逻辑值 (logical)
- TRUE（真/对/1）
- FALSE（假/错/0）
]

.pull-right[
### 🔤 字符串 (character)
- 必须用引号包起来
- "男"、"汉族"、"hello"
]

---

## 数据类型详解：数值型

### 数值型数据：R语言的"计算器"功能

.font-size-14[
```r
# 基本运算
2 * 2           # 乘法
3 ^ 3           # 幂运算（3的3次方）
log2(4)         # 对数

# 整数除法
10 %/% 3        # 结果：3（商）

# 求余数
10 %% 3         # 结果：1（余数）

# 四舍五入
round(3.14159)  # 结果：3
round(3.14159, 2)  # 结果：3.14（保留2位小数）
```
]

.numeric-tip[
💡 数值型数据可以直接进行数学运算
]

---

## 数据类型详解：字符串

### 字符串数据：用引号"包"起来的文字

.font-size-14[
```r
# 单引号或双引号都可以
"男"
'汉族'
"hello world"

# 注意：数字加引号就变成字符串了！
"666"            # 这是字符串，不是数字！
class("666")    # 查看类型：character
```
]

.string-warning[
⚠️ **字符串不能直接做数学运算！**
```r
"1" + "2"       # ❌ 报错：non-numeric argument to binary operator
```
]

---

## 数据类型详解：字符串

### 引号必须是英文！

.warning[
⚠️ **使用中文引号会报错！**

❌ `"你好"` 或 `'你好'` （这是中文引号）

✅ `"你好"` 或 `'你好'` （这是英文引号）
]

.common-error[
💡 新手常犯错误：使用中文输入法时输入了中文引号，导致代码报错
]

---

## 数据类型详解：逻辑值

### 逻辑型数据：真或假

.font-size-14[
```r
# 比较运算的结果
1 &lt; 2           # TRUE（1小于2，对的）
3 &gt; 5           # FALSE（3大于5，错的）
1 == 1          # TRUE（等于要双等号！）

# 查看类型
class(TRUE)     # "logical"
class(1 == 1)   # "logical"
```
]

.logical-tip[
💡 逻辑值在进行数学运算时会自动变成 1 (TRUE) 和 0 (FALSE)：
```r
TRUE * 3        # 结果：3
FALSE + 10      # 结果：10
```
]

---

## 数据类型之间的关系

### 有趣的"等价"关系

.font-size-14[
```r
# 逻辑值可以变成数值
1 == TRUE       # TRUE（因为 1 等于 TRUE）
0 == FALSE      # TRUE（因为 0 等于 FALSE）

# 数值可以变成字符串
class(666)                    # numeric
class(as.character(666))     # character

# 字符串不一定能变成数值
as.numeric("hello")           # NA（不是数字的字符串）
as.numeric("666")            # 666（可以转换）
```
]

---

## 如何查看数据类型？

### class() 函数：数据的"身份证"

.font-size-14[
```r
# 查看单个值
class(3.14)              # "numeric"
class("hello")           # "character"
class(TRUE)              # "logical"

# 查看变量
x &lt;- 10
class(x)                 # "numeric"

# 查看数据框
class(penguin_data)      # "data.frame"
class(penguin_data$age)  # 查看某列的类型
```
]

.str-tip[
💡 **is.** 和 **as.** 系列函数也可以判断和转换类型！
]

---

## is. 系列函数：判断类型

.font-size-14[
```r
x &lt;- 10
is.numeric(x)      # TRUE
is.character(x)    # FALSE
is.logical(x)      # FALSE

y &lt;- "hello"
is.character(y)    # TRUE
is.numeric(y)      # FALSE
```
]

---

## as. 系列函数：转换类型

.font-size-14[
```r
# 数值 → 字符串
x &lt;- 3.14
as.character(x)    # "3.14"

# 字符串 → 数值
y &lt;- "100"
as.numeric(y)      # 100

# 逻辑值 → 数值
as.numeric(TRUE)   # 1
as.numeric(FALSE)  # 0

# 数值 → 逻辑值
as.logical(1)      # TRUE
as.logical(0)      # FALSE
as.logical(100)    # TRUE（非零即为TRUE）
```
]

---

# 1.4 变量名规范

## 变量名：给数据贴标签

.var-def[
**变量名**就是给数据起的名字，比如 `age &lt;- 18`，意思是"创建一个叫 age 的标签，贴在 18 这个数字上"。
]

### 赋值符号：`&lt;-` 或 `=`

.font-size-14[
```r
# 两种写法都可以
x &lt;- 10
y = 20

# 查看变量
x              # 输出：10
y              # 输出：20

# 可以用变量做运算
x + y          # 输出：30
```
]

---

## 变量名规则：必须遵守

### ✅ 合法的变量名

.font-size-14[
- 字母：`a`, `b`, `age`, `name`
- 字母+数字：`age1`, `data2`, `score3`
- 下划线：`age_score`, `my_data`
- 点号：`my.data`（允许，但不推荐）
]

### ❌ 非法的变量名

.font-size-14[
- 数字开头：`2a`, `3data`
- 包含空格：`my age`
- 使用特殊符号：`my-data`, `data!`, `a+b`
- 使用保留字：`if`, `else`, `for`, `TRUE`, `FALSE`
]

---

## 变量名规则：区分大小写

### 重要！

.font-size-14[
```r
# 创建一个变量
age &lt;- 25

# 查看它
age       # ✅ 输出：25
Age       # ❌ 报错：object 'Age' not found
AGE       # ❌ 报错：object 'AGE' not found
```
]

.case-warning[
⚠️ R语言**区分大小写**！`age`、`Age`、`AGE` 是三个不同的变量！
]

---

## 变量名规则：常见错误

### 错误1：变量名写错

.font-size-14[
```r
# 正确
penguin_data$age

# 错误：把 age 拼成 aga
penguin_data$aga
# ❌ 报错：object 'penguin_data$aga' not found
```
]

### 错误2：数字开头

.font-size-14[
```r
# ❌ 非法
2nd_data &lt;- 10

# ✅ 正确
data2 &lt;- 10
second_data &lt;- 10
```
]

---

## 变量名建议：最佳实践

.good-practice[
### ✅ 推荐做法

.font-size-14[
- 使用有意义的英文单词：`age`, `gender`, `score`
- 使用下划线连接：`age_score`, `pre_test`
- 保持一致的大小写风格
]
]

.bad-practice[
### ❌ 避免做法

.font-size-14[
- 使用单个字母（除非是临时变量）：`x`, `y`, `z`
- 使用中文：`年龄`, `分数`
- 混用风格：`AgeScore` 和 `age_score` 混用
]
]
]

.warning-chinese[
⚠️ **中文变量名可能引发乱码问题！**
虽然R支持中文变量名，但不建议使用，可能在不同系统上出现编码问题。
]

---

## 特殊情况的变量名

### 如果真的需要"非法"变量名

.font-size-14[
```r
# 用反引号 ` ` 包围特殊变量名
`2nd_data` &lt;- 100
`my age` &lt;- 25

# 查看
`2nd_data`    # 输出：100
`my age`      # 输出：25
```
]

.special-case[
💡 **不推荐这样做**，尽量使用合法的变量名！
]

---

## 变量命名小结

| 规则 | 说明 | 示例 |
|------|------|------|
| 可用字符 | 字母、数字、下划线、点号 | `age`, `age_1`, `my.data` |
| 开头限制 | 不能是数字或特殊符号 | ✅ `data1` / ❌ `1data` |
| 大小写 | 区分大小写 | `age` ≠ `Age` |
| 保留字 | 不能用 `TRUE`, `FALSE`, `if` 等 | `TRUE` = 1, `FALSE` = 0 |
| 中文 | 可用但不推荐 | 可能乱码 |

---

# 1.5 特殊值：NA 与 NULL

## 缺失值：NA

.na-def[
**NA (Not Available)**：代表"缺失值"或"未知值"，就像Excel中的空白单元格。
]

.font-size-14[
```r
# 创建包含缺失值的向量
scores &lt;- c(90, 85, NA, 78, 92)
scores

# 直接计算会得到 NA
mean(scores)              # NA

# 需要移除缺失值
mean(scores, na.rm = TRUE)  # 84.375
```
]

.na-tip[
💡 `na.rm = TRUE` 的意思是 "remove NA"
]

---

## 缺失值：NA

### 识别和计数

.font-size-14[
```r
# 查看哪些是缺失值
is.na(scores)             # FALSE FALSE TRUE FALSE FALSE

# 统计缺失值个数
sum(is.na(scores))         # 1

# 查看唯一值（会排除NA）
unique(scores)             # 90 85 78 92（NA被排除）
```
]

---

## 空值：NULL

.null-def[
**NULL**：代表"空"，即什么都没有，连缺失都不算。
]

.font-size-14[
```r
# NULL 的特点
x &lt;- NULL
length(x)                  # 0
is.null(x)                 # TRUE

# NULL vs NA
is.null(NA)                # FALSE（NA是缺失，不是空）
is.na(NULL)                # FALSE
```
]

.null-warning[
⚠️ **重要区别**：
- `NA`：有值，但是缺失
- `NULL`：根本没有值

赋值 `NULL` 会直接删除变量或变量中的内容（不可逆！）
]

# 2.1 Workflow 1：数值型数据

## 工作流程：读取 → 查看 → 检查 → 分析

.font-size-14[
```r
# 1. 读取数据
age_col &lt;- penguin_data$age

# 2. 查看数据
class(age_col)              # 应该是 "numeric"
summary(age_col)            # 最小值、1/4分位、中位数、平均值、3/4分位、最大值
mean(age_col)               # 平均值
sd(age_col)                 # 标准差
range(age_col)              # 范围

# 3. 分析数据
psych::describe(age_col)
```
]

⚠️ **人工检查**：数据类型是否正确？取值范围是否合理？（如年龄18-100）有没有异常值？

---

# 2.2 Workflow 2：字符串型数据

## 工作流程：读取 → 查看 → 检查编码 → 清理/转换

.font-size-14[
```r
# 1. 读取数据
gender &lt;- penguin_data$gender

# 2. 查看数据
class(gender)              # 应该是 "character"
unique(gender)             # 查看有哪些值
table(gender)              # 统计每个值的个数

# 3. 清理数据
gender &lt;- trimws(gender)   # 去除多余空格
# 统一编码
gender &lt;- ifelse(gender == "M", "Male",
           ifelse(gender == "F", "Female", gender))
```
]

⚠️ **人工检查**：编码是否统一？"男"还是"M"？"China"还是"CHINA"？缺失值如何表示？

---

# 2.3 Workflow 3：逻辑型数据

## 工作流程：生成条件 → 查看结果 → 用于筛选

.font-size-14[
```r
# 1. 创建逻辑条件
is_adult &lt;- age &gt;= 18
is_China &lt;- country == "China"

# 2. 查看逻辑结果
sum(is_adult)               # 满足条件的个数
mean(is_adult)              # 满足条件的比例

# 3. 组合条件
condition &lt;- (age &gt; 25) &amp; (age &lt; 40) &amp; is_China

# 4. 筛选数据
filtered_data &lt;- penguin_data[condition, ]
```
]

⚠️ **人工检查**：条件逻辑是否正确？边界值是否包含（`&gt;` vs `&gt;=`）？AND/OR是否用对？

---

# 2.4 Workflow 4：数据框

## 工作流程：读取 → 查看结构 → 选取变量 → 创建/清洗 → 保存

.font-size-14[
```r
# 1. 读取数据
df &lt;- bruceR::import(here::here("slides", "data", "penguin", "penguin_rawdata.csv"))

# 2. 查看结构
str(df)                     # 查看每列类型
head(df)                    # 查看前几行
dim(df)                     # 行数和列数

# 3. 选取变量（三种方法）
df$age                      # 美元符
df[, 1:5]                   # 中括号
df[, c("age", "gender")]    # 指定列名

# 4. 创建新变量
df$age_group &lt;- ifelse(df$age &lt; 30, "青年", "中年")

# 5. 保存数据
bruceR::export(df, here::here("output", "cleaned_data.csv"))
```
]

⚠️ **人工检查**：数据是否正确读取？变量名是否正确？数据类型是否符合预期？

---

# 2.5 综合案例：数据清洗

## 完整工作流程示例

.font-size-14[
```r
# Step 1: 读取数据
df &lt;- bruceR::import(here::here("slides", "data", "penguin", "penguin_rawdata.csv"))

# Step 2: 查看结构 ⚠️ 人工检查
str(df)
```
]

⚠️ **人工检查1**：数据类型对吗？变量名有拼写错误吗？有没有明显错误（如年龄999岁）？

.font-size-14[
```r
# Step 3: 清洗数据
df$age[df$age &lt; 0] &lt;- NA           # 处理异常值
df$gender[df$gender == "M"] &lt;- "Male"  # 统一编码
df$gender[df$gender == "F"] &lt;- "Female"

# Step 4: 创建新变量
df$age_group &lt;- cut(df$age, 
                    breaks = c(0, 30, 50, 100),
                    labels = c("青年", "中年", "老年"))
```
]

⚠️ **人工检查2**：清洗逻辑是否正确？编码规则是否一致？

.font-size-14[
```r
# Step 5: 保存结果
bruceR::export(df, here::here("output", "cleaned_penguin.csv"))
```
]
