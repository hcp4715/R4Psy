# 定义数据类型转换函数

.font-size-14[
将 Sub 从 character 转为 numeric，避免 bind_rows 时类型不匹配
]


``` r
convert_data_types = function(df) {
  df &lt;- df %&gt;%
    dplyr::mutate(
      Sub = as.numeric(Sub),
      Age = as.numeric(Age),
      Block = as.numeric(Block),
      Bin = as.numeric(Bin),
      Trial = as.numeric(Trial),
      Shape = as.character(Shape),
      Label = as.character(Label),
      Match = as.character(Match),
      CorrResp = as.character(CorrResp),
      Resp = as.character(Resp),
      ACC = as.numeric(ACC),
      RT = as.numeric(RT)
    )
  return(df)
}
```

---

# 实验数据的导入 - 使用 for loop 批量导入

``` r
# 初始化为空
df3 &lt;- NULL

# 循环读取每个文件，处理数据并添加到数据框中
for (i in seq_along(files)) {
  # 读取数据文件
  df &lt;- read.table(files[i], header = TRUE) 
  # 使用 filter 函数过滤掉 Date 列值为 "Date" 的行
  df &lt;- dplyr::filter(df, Date != "Date") 
  # 调用函数进行数据类型转换
  df &lt;- convert_data_types(df)
  # 使用 bind_rows() 函数将当前数据框与之前的数据框合并
  df3 &lt;- dplyr::bind_rows(df3, df)
}

# 清除中间变量
rm(df, files, i)
```

# 7.2 基于LLM和OpenCode的实操演练


.pull-left[
.font-size-14[
为什么要先把问题说清楚？

本章的数据预处理，本质上也是一个**问题解决（problem solving）**过程。

**初始状态（Initial State）**
- 我当前有什么数据？
- 变量、类型、缺失值是否清楚？

**路径（Path）**
- 需要哪些步骤、函数或包？
- 哪些前提还不能直接假设？

**目标状态（Goal State）**
- 我最后要得到什么结果？
- 是清洗后的数据，还是汇总表？
]
]

.pull-right[
.font-size-14[
**先把问题说清楚：**

已有数据  
变量 / 类型 / 缺失值  
`↓`

目标结果  
清洗数据 / 派生指标 / 汇总表  
`↓`

实现约束  
包 / 路径 / 缺失值处理 / 输出格式  
`↓`

**再向 LLM 提问**

&lt;br&gt;

**一句话版本：**  
现状 → 目标 → 约束 → 提问
]
]

.font-size-14[
💡 提问时，先说清**现状、目标、约束**。
]

---

# 7.2.1 Prompt 1：先澄清问题，再开始规划（1/2）

.font-size-14[
**核心原则：先在Planning模式下消灭假设，再开始写代码。**

**可直接使用的prompt：**
```
我正在做数据预处理任务。在写任何代码之前，请先在 Planning 模式下持续追问并澄清我的需求。
不要擅自做未说明的假设。请一直问到关键前提都被澄清。

请你重点澄清：
1. 我当前的数据是什么，包含哪些关键变量；
2. 我的目标结果是什么；
3. 中间需要哪些步骤；
```
]

# 7.2.1 Prompt 1：先澄清问题，再开始规划（2/2）

.font-size-14[
```
4. 哪些约束会影响实现（如包、路径、缺失值、输出格式）；
5. 我还没有说明但必须确认的信息。

# 7.2.3 分析笔记文件：analysis_notes.md（3/4）

.font-size-14[
**analysis_notes.md 示例内容：**

```markdown
# Analysis Notes - RT Data Processing

## 研究问题
计算 match-moral 条件下的自我优势效应(SPE)

## 数据来源
- 文件位置：slides/data/match/
- 文件格式：.out 文件

## 关键变量
- Sub: 被试编号
- Shape: 刺激类型（moralSelf, moralOther, immoralSelf, immoralOther）
- Match: 匹配条件（match, mismatch）
- RT: 反应时（ms）
- ACC: 正确率（0, 1）

## 计算逻辑
1. 筛选有效试次：ACC == 0|1 &amp; RT in [200, 1500]
2. 按被试和条件计算平均 RT
3. 筛选 match + moral 条件
4. 长转宽：Self 和 Other 分别作为列
5. SPE = Self RT - Other RT
```

]

# 7.2.3 分析笔记文件：analysis_notes.md（4/4）

.font-size-14[

1. **减少重复输入**

   - 不用每次都写计算逻辑

2. **便于迭代优化**
   - 思路可以随时查看和修改
   - AI 可以基于现有逻辑改进

3. **便于团队协作**
   - 分析逻辑文档化
   - 其他人也能理解你的思路

**建议：** 把 analysis_notes.md 放在数据文件夹或项目根目录中。
]
